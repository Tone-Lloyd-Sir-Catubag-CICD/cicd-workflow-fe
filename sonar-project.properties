# SonarCloud scanner configuration.
# sonar.projectKey and sonar.organization are injected by the CI pipeline via secrets —
# do not hardcode them here to avoid conflicts with the central workflow's CLI args.

# Source and test directories
sonar.sources=src
sonar.tests=tests

# Coverage report — generated by Jest (lcov reporter in jest.config.js)
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Exclusions — skip generated files, type declarations, and app-level pages
# (these are excluded from Jest coverage collection as well)
sonar.exclusions=\
  node_modules/**,\
  .next/**,\
  coverage/**,\
  public/**,\
  **/*.d.ts

sonar.coverage.exclusions=\
  src/app/**,\
  src/components/**,\
  src/lib/api/**,\
  **/*.d.ts,\
  tests/**

# Test file patterns
sonar.test.inclusions=\
  tests/**/*.test.ts,\
  tests/**/*.test.tsx,\
  src/**/*.test.ts,\
  src/**/*.test.tsx

# TypeScript / JavaScript settings
sonar.typescript.tsconfigPath=tsconfig.json
